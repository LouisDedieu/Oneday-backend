name: Keep Render Alive

on:
  schedule:
    # Toutes les 14 minutes (Render free tier dort après 15 min d'inactivité)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://bombo-backend.onrender.com/health || echo "000")
          echo "Response code: $response"
          if [ "$response" = "000" ]; then
            echo "Server might be waking up, retrying..."
            sleep 5
            curl -s https://bombo-backend.onrender.com/health
          fi
